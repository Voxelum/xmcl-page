name: "Deploy"
on:
  push:
    branches:
      - "docs-reload"
      - "master"
    paths:
      - .github/workflows/deploy.yaml
      - api/**
      - functions/**
      - src/**
      - .vitepress/**
      - locales/**
      - public/**
      - vite.config.ts
      - staticwebapp.config.json
      - scripts/build.ts
      - wrangler.jsonc
      - package.json
      - pnpm-lock.yaml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: voxelum/minecraft-launcher-core-node
          path: src/en/core
          ref: 'gh-pages'
      - uses: pnpm/action-setup@v4
        with:
          version: 9.3.0
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: "Install"
        run: "pnpm i"
      - name: "Build"
        run: "pnpm run build"
        env:
          DEV: false
          PROD: true
          VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_TOKEN }}
      - name: Deploy Azure
        if: github.ref_name == 'master'
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_THANKFUL_MUD_0911A2700 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          app_location: ".vitepress/dist" # App source code path
          api_location: "api" # Api source code path - optional
          config_file_location: "."
          skip_app_build: true
          skip_api_build: true
      - name: Deploy Cloudflare Pages production
        if: github.ref_name == 'master'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy --project-name=xmcl-page
