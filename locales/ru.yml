repository: Репозиторий с исходным кодом
intro:
  first:
    body: Лаунчер для Minecraft с {openSource} и {modernUx} интерфейсом.
    openSource: открытым кодом
    modernUx: современным
  second:
    body: Обеспечьте {diskEfficient} управления всеми своими {mods}!
    diskEfficient: эффективный способ
    mods: модами
  description: >-
    X Minecraft Launcher (XMCL) - это современный лаунчер для Minecraft, который
    позволяет управлять огромными ресурсами, такими как модпаки, текстурпаки,
    моды, шейдеры. Ещё он имеет интеграцию с Forge, Fabric, Quilt, CurseForge и
    Modrinth.
