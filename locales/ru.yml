  Если перенаправления не происходит, вы можете попробовать нажать на «Открыть в
  лаунчере», чтобы использовать перенаправлением вручную.
redirectHelperMessage: >-
  Появится всплывающее окно с предложением открыть лаунчер. Если по-прежнему не
  работает, можно попробовать перетащить кнопку в окно лаунчера!
