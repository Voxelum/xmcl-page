repository: Repozytorium kodu źródłowego
intro:
  first:
    body: "{openSource} launcher Minecraft z {modernUx} interfejsem UX"
    openSource: "otwartoźródłowy"
    modernUx: "nowoczesnym"
  second:
    body: "Zapewnia {diskEfficient} sposób zarządzania wszystkimi swoimi {mods}!"
    diskEfficient: "oszczędzający miejsce na dysku"
    mods: "modami"
  description: >-
    X Minecraft Launcher (XMCL) to nowoczesny launcher Minecraft, który pozwala
    zarządzać ogromnymi zasobami, takimi jak paczki modów, paczki zasobów, mody,
    shadery... Posiada również integrację z Minecraft Forge, Fabric, Quilt,
    CurseForge i Modrinth.
