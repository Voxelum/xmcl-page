redirectHelperTitle: >-
  リダイレクトされない場合は、「アプリで開く」ボタンをクリックして手動でリダイレクトしてみてください。
redirectHelperMessage: >-
  ポップアップが表示され、ランチャーを開くように要求されます。それでも機能しない場合は、
  ボタンをランチャーウィンドウにドラッグしてみてください！
