repository: ソースコードリポジトリ
intro:
  first:
    body: "{modernUx}なUXを備えた{openSource} Minecraftランチャー"
    openSource: "オープンソース"
    modernUx: "モダン"
  second:
    body: "すべての{mods}を管理するための{diskEfficient}な方法を提供します！"
    diskEfficient: "ディスク効率的"
    mods: "MOD"
  description: >-
    X Minecraft Launcher (XMCL)は、MODパック、リソースパック、MOD、シェーダーパックなどの大量のリソースを
    管理できる現代的なMinecraftランチャーです。また、Minecraft Forge、Fabric、Quilt、
    CurseForge、Modrinthとの連携も備えています。
