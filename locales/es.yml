authSuccess: ¡Éxito!
authSuccessTitle: Autorización exitosa. ¡Será redirigido de vuelta al lanzador!
redirectHelperTitle: >-
  Si no se redirige automáticamente, puede intentar hacer clic en el botón
  "Abrir en el Lanzador".
redirectHelperMessage: >-
  Aparecerá una ventana emergente que le pedirá abrir el lanzador. Si esto no funciona,
  ¡intente arrastrar el botón a la ventana del lanzador!
notWork: ¿No funciona?
openInAppButton: Abrir en el Lanzador
nothingWork: >-
  Si nada de esto funciona, puede descargar la última versión
  del lanzador de nuevo.
gameInstall:
  title:
    body: No se preocupe más por la {gameInstall}
    gameInstall: Instalación del juego
  description: >-
    XMCL admite la instalación de Minecraft oficial, Forge, Fabric e incluso
    OptiFine, ¡todo en un solo lugar! Puede instalarlos directamente en el lanzador.
optimalDisk:
  title:
    body: Espacio en disco {optimal} con {massiveResources}
    optimal: Óptimo
    massiveResources: recursos masivos
  description: >-
    XMCL guarda todos los mods, paquetes de recursos, shaders y modpacks en un solo lugar.
    En lugar de copiar archivos para cada perfil, se usan enlaces duros. Esto significa
    que nunca verá archivos duplicados en la carpeta /mods, ahorrando mucho espacio en disco.
cleanWorkspace:
  title:
    body: Mantenga su espacio de trabajo {clean} con múltiples perfiles
    clean: limpio
  description: >-
    XMCL tiene soporte integrado para múltiples instancias. Puede crear múltiples
    instancias fácilmente para no preocuparse por mezclar configuraciones de lanzamiento.
communityIntegration:
  title:
    body: Integrado con {multipleCommunities}
    multipleCommunities: múltiples comunidades
  description: >-
    XMCL viene con soporte integrado para Curseforge y Modrinth. También ofrece la
    posibilidad de admitir cuentas de usuario personalizadas y sistemas de skins como Blessing Skin.
