intro:
  first:
    body: Un lanzador de Minecraft con {openSource} y una interfaz {modernUx}.
    openSource: código abierto
    modernUx: moderna
  second:
    body: ¡Consiga una gestión {diskEfficient} para todos sus {mods}!
    diskEfficient: eficiente en disco
    mods: mods
  description: >-
    X Minecraft Launcher (XMCL) es un lanzador moderno de Minecraft que permite
    gestionar recursos masivos como modpacks, paquetes de recursos, mods,
    shaders... También está integrado con Minecraft Forge, Fabric, Quilt,
    CurseForge y Modrinth.
