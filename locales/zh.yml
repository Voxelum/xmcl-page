      title: 实例设置
      benefit: 独立调整 Java、内存、版本、加载器和启动行为，不影响其他配置。
      capabilities: 独立的实例配置|选择版本和加载器|设置实例外观
    instance-theme:
      title: 实例主题
      benefit: 使用背景、颜色、模糊、字体和自定义 CSS 为每个世界赋予独立风格。
      capabilities: 背景图片和遮罩|圆角与字体设置|导入和导出主题
    local-server:
      title: 启动本地服务器
      benefit: 将实例变成本地服务器，并配置世界、玩家上限和可导出的文件。
      capabilities: MOTD、端口和玩家上限|选择世界与服务器文件|导出服务器包
    server-list:
      title: 服务器列表
      benefit: 将多人服务器放在对应实例附近，并实时查看连接状态。
      capabilities: 服务器状态与玩家数量|置顶和移除服务器|清晰显示连接失败
    modpack-market:
      title: 整合包市场
      benefit: 在一个可搜索的市场中浏览 Modrinth、CurseForge 和 FTB 内容。
      capabilities: 来源、版本、加载器和分类筛选|发现热门与最新整合包|打开整合包详情
    online-mod-search:
      title: 在线模组搜索
      benefit: 在模组进入实例前，从主要社区平台找到兼容的模组。
      capabilities: Modrinth 与 CurseForge 来源|Minecraft 版本和加载器筛选|环境与分类筛选
    modpack-detail:
      title: 整合包详情
      benefit: 在安装前了解整合包的截图、作者、统计数据和技术要求。
      capabilities: 截图、标签和项目统计|安装与启动操作|技术信息和外部资源
    mod-collections:
      title: 模组收藏
      benefit: 保存想要再次访问的项目，并将收藏转换为可复用的配置。
      capabilities: 启动器收藏|关注的 Modrinth 项目|批量安装和收藏管理
    mod-detail:
      title: 模组详情
      benefit: 在修改实例前了解模组的版本、依赖、来源和兼容信息。
      capabilities: 版本选择和依赖|加载器、分类和来源链接|描述和外部资源
    local-mods:
      title: 已安装模组管理
      benefit: 快速查看启用内容、筛选模组，并保持当前配置健康。
      capabilities: 搜索、排序和筛选模组|检查依赖和未使用内容|选择更新策略
    custom-mod-groups:
      title: 自定义模组分组
      benefit: 创建自己的分组，并保存整理复杂实例的规则。
      capabilities: 应用和保存分组规则|从右键菜单添加模组|启用、禁用或查看文件
    save-preview:
      title: 存档预览与区块工具
      benefit: 启动世界前先查看地图，并精确处理 Minecraft 区块。
      capabilities: 平移和查看世界地图|选择、复制或删除区块|查看世界属性和材料
    blueprint-preview:
      title: 蓝图预览
      benefit: 以 3D 预览建筑结构，在放入游戏前确认兼容性和材料。
      capabilities: 支持 Litematica 和 WorldEdit 格式|兼容性与缺少模组状态|材料清单和格式转换
    modpack-export:
      title: 整合包导出
      benefit: 将实例打包分享给其他玩家，同时保留必要的元数据和文件。
      capabilities: CurseForge 和 Modrinth 导出|作者、描述和 URL 元数据|选择要包含的文件和资源
    server-export:
      title: 服务器导出
      benefit: 选择正确的世界和服务器文件，导出清晰配置的本地服务器。
      capabilities: 导出到文件夹或上传|选择服务器文件|配置 MOTD 和服务器选项
    account-login:
      title: 多种认证服务
      benefit: 使用适合自己玩法的账号服务，从 Microsoft、离线账号到第三方认证均可选择。
      capabilities: Microsoft 和离线账号|Ely.by 与 LittleSkin 服务|添加和管理认证服务
    quick-action:
      title: 快捷操作
      benefit: 无需离开当前页面即可搜索实例和执行命令。
      capabilities: 搜索命令、实例和模组|启动或创建实例|使用 Ctrl+K 键盘导航
    crash-diagnosis:
      title: 崩溃与启动失败报告
      benefit: 查看启动失败背后的日志、崩溃报告和服务器输出。
      capabilities: 日志、崩溃报告和启动失败|模组解析错误与退出代码|复制 Prompt 给外部 AI 工具
    ai-agent:
      title: 内置 AI Agent
      benefit: 让 Agent 检查实例虚拟文件系统，并解释可执行的解决方案。
      capabilities: 读取实例文件和报告|分析问题再得出结论|在可能时应用解决方案
