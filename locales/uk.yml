gameInstall:
  title:
    body: Більше не турбуйтеся про {gameInstall}
    gameInstall: Встановлення гри
  description: >-
    XMCL підтримує встановлення ванільного Minecraft, Forge, Fabric та навіть
    OptiFine — все в одному місці! Ви можете встановити їх прямо в лаунчері.
    Також підтримується завантаження через BMCL API, а за бажанням можна налаштувати
    власне дзеркало.
optimalDisk:
  title:
    body: '{optimal} дисковий простір з {massiveResources}'
    optimal: Оптимальний
    massiveResources: масивними ресурсами
  description: >-
    XMCL зберігає всі моди, пакети ресурсів, шейдери та модпаки в одному місці.
    Замість копіювання файлів для кожного ігрового профілю використовуються жорсткі
    посилання. Це означає, що ви більше ніколи не побачите дублікатів файлів у
    папці /mods, що значно економить місце на диску.
cleanWorkspace:
  title:
    body: Тримайте робоче місце {clean} завдяки кільком профілям
    clean: чистим
  description: >-
    XMCL має вбудовану підтримку кількох профілів (екземплярів) гри. Ви можете
    легко створити кілька профілів, не турбуючись про змішування різних версій
    чи налаштувань запуску.
communityIntegration:
  title:
    body: Об'єднуйтесь з {multipleCommunities}
    multipleCommunities: різними спільнотами
  description: >-
    XMCL підтримує CurseForge та Modrinth. Також є можливість використовувати
    сторонні системи авторизації та скінів, такі як Blessing Skin.
