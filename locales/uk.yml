intro:
  first:
    body: Програма запуску Minecraft з {openSource} та {modernUx} UX.
    openSource: відкритим вихідним кодом
    modernUx: сучасним
  second:
    body: Забезпечує {diskEfficient} керування усіма вашими {mods}!
    diskEfficient: ефективний спосіб
    mods: модами
  description: >-
    X Minecraft Launcher (XMCL) — це сучасна програма запуску Minecraft, яка
    дозволяє вам керувати своїми величезними ресурсами, такими як пакети модів,
    пакети ресурсів, пакети шейдерів, окемі моди тощо. Вона також має інтеграцію з
    Minecraft Forge, Fabric, Quilt, CurseForge та Modrinth.
