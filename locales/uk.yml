authSuccessTitle: Авторизація пройшла успішно. Ви будете перенаправлені назад до програми запуску!
redirectHelperTitle: >-
  Якщо вас не буде перенаправлено, ви можете спробувати натиснути кнопку
  «Відкрити в програмі», щоб перенаправити себе вручну.
redirectHelperMessage: >-
  Зʼявиться спливне вікно з проханням відкрити панель запуску. Якщо це все ще
  не спрацює, можете спробувати перетягнути кнопку у вікно запуску!
notWork: Не працює?
openInAppButton: Відкрити у програмі запуску
nothingWork: >-
  Якщо нічого з вищезазначеного не працює, вам може знадобитися
  повторно завантажити останню версію програми запуску
gameInstall:
  title:
    body: Більше ніяких турбот про {gameInstall}
    gameInstall: встановлення гри
  description: >-
    XMCL підтримує встановлення ванільного Minecraft, Minecraft Forge, Fabric і
    навіть Optifine — усе в одному! Ви можете встановити їх в одному місці в межах
    програми запуску. Вона також підтримує API стороннього дзеркального посилання BMCL.
    Ви навіть можете налаштувати власне дзеркало.
optimalDisk:
  title:
    body: '{optimal} дисковий простір з {massiveResources}'
    optimal: Оптимальний
    massiveResources: Масивними Ресурсами
  description: >-
    XMCL зберігатиме всі моди, пакети ресурсів, пакети шейдерів і пакети модів
    в одному місці. Якщо ви спробуєте використати будь-який відомий ресурс,
    програма буде використовувати жорстке посилання на екземпляр ресурсу,
    для встановлення без копіювання. Це означає ви більше ніколи не побачите
    жодної дубльованої копії в папці /mods.
cleanWorkspace:
  title:
    body: Тримайте робоче місце {clean} за допомогою мультиекземплярів
    clean: чистим
  description: >-
    XMCL має вбудовану підтримку мультиекземплярів. Ви легко можете створити кілька
    екземплярів. Тож вам не потрібно турбуватися про суміш різних параметрів
    запуску.
communityIntegration:
  title:
    body: Інтегровано з {multipleCommunities}
    multipleCommunities: кількома спільнотами
  description: >-
    XMCL має вбудовану підтримку Curseforge і Modrinth. Програма також
    забезпечує здатність для підтримки власних користувацьких облікових записів
    /систем скінів, на кшталт Blessing Skin.
