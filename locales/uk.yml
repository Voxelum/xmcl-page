intro:
  first:
    body: Лаунчер Minecraft з {openSource} та {modernUx} інтерфейсом.
    openSource: відкритим кодом
    modernUx: сучасним
  second:
    body: Забезпечте {diskEfficient} керування всіма своїми {mods}!
    diskEfficient: ефективне для диска
    mods: модами
  description: >-
    X Minecraft Launcher (XMCL) — це сучасний лаунчер Minecraft, який дозволяє
    керувати такими величезними ресурсами, як модпаки, пакети ресурсів, моди,
    шейдери... Він також інтегрований з Minecraft Forge, Fabric, Quilt,
    CurseForge та Modrinth.
