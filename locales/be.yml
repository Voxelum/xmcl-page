  Калі вас не перанакіравала аўтаматычна, вы можаце паспрабаваць націснуць кнопку
  «Адкрыць у лаўнчары».
redirectHelperMessage: >-
  З'явіцца ўсплывальнае акно з запытам на адкрыццё лаўнчара. Калі гэта не спрацуе,
  паспрабуйце перацягнуць кнопку ў акно лаўнчара!
