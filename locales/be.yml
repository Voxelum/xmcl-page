gameInstall:
  title:
    body: Больш не турбуйцеся пра {gameInstall}
    gameInstall: Усталёўку гульні
  description: >-
    XMCL падтрымлівае ўсталёўку ванільнага Minecraft, Forge, Fabric і нават
    OptiFine — усё ў адным месцы! Вы можаце ўсталяваць іх прама ў лаўнчары.
optimalDisk:
  title:
    body: '{optimal} дыскавая прастора з {massiveResources}'
    optimal: Аптымальная
    massiveResources: масіўнымі рэсурсамі
  description: >-
    XMCL захоўвае ўсе моды, пакеты рэсурсаў, шэйдары і модпакі ў адным месцы.
    Замест капіявання файлаў для кожнага гульнявога профілю выкарыстоўваюцца жорсткія
    спасылкі. Гэта азначае, што вы больш ніколі не ўбачыце дублікатаў файлаў у
    папцы /mods, што значна эканоміць месца на дыску.
cleanWorkspace:
  title:
    body: Трымайце працоўнае месца {clean} дзякуючы некалькім профілям
    clean: чыстым
  description: >-
    XMCL мае ўбудаваную падтрымку некалькіх профіляў гульні. Вы можаце
    лёгка стварыць некалькі профіляў, не турбуючыся аб змешванні розных версій
    ці налад запуску.
communityIntegration:
  title:
    body: Аб'ядноўвайцеся з {multipleCommunities}
    multipleCommunities: рознымі супольнасцямі
  description: >-
    XMCL падтрымлівае CurseForge і Modrinth. Таксама ёсць магчымасць выкарыстоўваць
    староннія сістэмы аўтарызацыі і скінаў, такія як Blessing Skin.
