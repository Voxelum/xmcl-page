  description: >-
    X Minecraft Launcher (XMCL) — це сучасны лаўнчар Minecraft, які дазваляе
    кіраваць такімі велізарнымі рэсурсамі, як модпакі, пакеты рэсурсаў, моды,
    шэйдары... Ён таксама інтэграваны з Minecraft Forge, Fabric, Quilt,
    CurseForge і Modrinth.
