repository: Quellcode-Repository
label: Deutsch
intro:
  first:
    body: Ein {openSource} Minecraft-Launcher mit {modernUx} UX.
    openSource: quelloffener
    modernUx: moderner
  second:
    body: Ein {diskEfficient} Weg zur Verwaltung all deiner {mods}!
    diskEfficient: speichereffizienter
    mods: Mods
  description: >-
    X Minecraft Launcher (XMCL) ist ein moderner Minecraft-Launcher, mit dem du
    deine Ressourcen wie Modpacks, Ressourcenpakete, Mods und Shader-Pakete ganz
    einfach verwalten kannst. Er bietet außerdem Integrationen für Forge, Fabric,
    Quilt, CurseForge und Modrinth.
