authSuccess: Erfolg!
authSuccessTitle: Die Autorisierung war erfolgreich. Du wirst zurück zum Launcher weitergeleitet!
redirectHelperTitle: >-
  Wenn du nicht weitergeleitet wirst, kannst du versuchen, auf die
  Schaltfläche 'Im Launcher öffnen' zu klicken.
redirectHelperMessage: >-
  Es öffnet sich ein Pop-up-Fenster, in dem du aufgefordert wirst, den
  Launcher zu öffnen. Wenn es immer noch nicht funktioniert, ziehe die
  Schaltfläche direkt in das Launcher-Fenster!
notWork: Funktioniert nicht?
openInAppButton: Im Launcher öffnen
nothingWork: >-
  Wenn nichts davon funktioniert, lade bitte die neueste Version des
  Launchers herunter
gameInstall:
  title:
    body: Keine Sorgen mehr bei der {gameInstall}
    gameInstall: Spielinstallation
  description: >-
    XMCL unterstützt die Installation von Vanilla-Minecraft, Forge, Fabric und
    sogar OptiFine! Du kannst alles an einem einzigen Ort im Launcher
    installieren. Auch Drittanbieter-Spiegelserver wie die BMCL-API werden
    unterstützt, und du kannst eigene Spiegelserver im Launcher hinzufügen.
optimalDisk:
  title:
    body: '{optimal}er Speicherplatz trotz {massiveResources}'
    optimal: Optimal
    massiveResources: massiver Ressourcen
  description: >-
    XMCL speichert alle Mods, Ressourcenpakete, Shader und Modpacks an einem
    einzigen Ort. Anstatt Dateien für jedes Profil zu kopieren, werden Hardlinks
    verwendet. Dadurch hast du nie wieder Duplikate im mods-Ordner, was enorm
    viel Speicherplatz spart.
cleanWorkspace:
  title:
    body: Halte deinen Arbeitsbereich {clean} dank mehrerer Instanzen
    clean: sauber
  description: >-
    XMCL bietet eine integrierte Unterstützung für mehrere Instanzen (Profile).
    Du kannst ganz einfach verschiedene Instanzen erstellen und musst dir keine
    Sorgen um Konflikte bei den Start-Einstellungen machen.
communityIntegration:
  title:
    body: Integriert mit {multipleCommunities}
    multipleCommunities: verschiedenen Communities
  description: >-
    XMCL bietet native Unterstützung für CurseForge und Modrinth. Zudem können
    benutzerdefinierte Konten und Skin-Systeme wie Blessing Skin eingebunden werden.
download-tarxz: Tar.xz
download-linuxZip: Zip
