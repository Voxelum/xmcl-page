authSuccess: Successo!
authSuccessTitle: Autorizzazione completata con successo. Sarai reindirizzato al launcher!
redirectHelperTitle: >-
  Se non vieni reindirizzato automaticamente, puoi provare a fare clic sul pulsante
  "Apri nel Launcher".
redirectHelperMessage: >-
  Apparirà una finestra pop-up che richiederà l'apertura del launcher. Se non funziona,
  prova a trascinare il pulsante nella finestra del launcher!
notWork: Non funziona?
openInAppButton: Apri nel Launcher
nothingWork: >-
  Se nessuna di queste opzioni funziona, puoi scaricare nuovamente l'ultima versione
  del launcher.
gameInstall:
  title:
    body: Non preoccuparti più dell' {gameInstall}
    gameInstall: installazione del gioco
  description: >-
    XMCL supporta l'installazione di Minecraft vanilla, Forge, Fabric e persino
    OptiFine, tutto in un unico posto! Puoi installarli direttamente dal launcher.
optimalDisk:
  title:
    body: Spazio su disco {optimal} con {massiveResources}
    optimal: Ottimale
    massiveResources: risorse enormi
  description: >-
    XMCL salva mod, pacchetti di risorse, shader e modpack in un unico posto.
    Invece di copiare i file per ogni profilo, vengono usati collegamenti fisici (hard link). Questo significa
    che non vedrai mai file duplicati nella cartella /mods, risparmiando molto spazio su disco.
cleanWorkspace:
  title:
    body: Mantieni il tuo spazio di lavoro {clean} grazie ai profili multipli
    clean: pulito
  description: >-
    XMCL ha il supporto integrato per istanze multiple. Puoi creare facilmente
    più istanze per non doverti preoccupare di mischiare le impostazioni di avvio.
communityIntegration:
  title:
    body: Integrato con {multipleCommunities}
    multipleCommunities: comunità multiple
  description: >-
    XMCL viene fornito con supporto integrato per Curseforge e Modrinth. Offre inoltre la
    possibilità di supportare account utente personalizzati e sistemi di skin come Blessing Skin.
