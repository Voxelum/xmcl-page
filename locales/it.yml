intro:
  first:
    body: Un launcher di Minecraft con {openSource} e un'interfaccia {modernUx}.
    openSource: codice sorgente aperto
    modernUx: moderna
  second:
    body: Ottieni una gestione {diskEfficient} per tutte le tue {mods}!
    diskEfficient: efficiente per il disco
    mods: mod
  description: >-
    X Minecraft Launcher (XMCL) è un moderno launcher di Minecraft che permette
    di gestire enormi risorse come modpack, pacchetti di risorse, mod,
    shader... È inoltre integrato con Minecraft Forge, Fabric, Quilt,
    CurseForge e Modrinth.
