intro:
  first:
    body: لانشر ماينكرافت {openSource} مع تجربة مستخدم {modernUx}.
    openSource: مفتوح المصدر
    modernUx: حديثة
  second:
    body: يوفر طريقة {diskEfficient} لإدارة جميع {mods} الخاصة بك!
    diskEfficient: موفرة للمساحة
    mods: المودات
  description: >-
    X Minecraft Launcher (XMCL) هو لانشر ماينكرافت حديث يتيح لك إدارة مواردك الهائلة مثل حزم المودات، حزم الموارد، المودات، وحزم الشادر... كما أنه يتكامل مع Minecraft Forge و Fabric و Quilt و CurseForge و Modrinth.
