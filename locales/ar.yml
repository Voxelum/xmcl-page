authSuccess: تم بنجاح!
authSuccessTitle: تمت المصادقة بنجاح. سيتم توجيهك مرة أخرى إلى اللانشر!
redirectHelperTitle: >-
  إذا لم يتم توجيهك تلقائياً، يمكنك النقر على زر "الفتح في التطبيق" للتوجيه يدوياً.
redirectHelperMessage: >-
  سيظهر لك مربع حوار يطلب منك فتح اللانشر. إذا كان لا يزال لا يعمل، يمكنك محاولة سحب الزر إلى نافذة اللانشر!
notWork: لا يعمل؟
openInAppButton: الفتح في اللانشر
nothingWork: إذا لم يعمل أي مما سبق، فقد ترغب في إعادة تنزيل أحدث إصدار من اللانشر
gameInstall:
  title:
    body: لا داعي للقلق بشأن {gameInstall} بعد الآن
    gameInstall: تثبيت اللعبة
  description: >-
    يدعم XMCL تثبيت ماينكرافت الأصلية (Vanilla)، و Minecraft Forge، و Fabric، وحتى Optifine الكل في واحد! يمكنك تثبيتهم في مكان واحد داخل اللانشر. كما أنه يدعم رابط المرآة التابع لجهات خارجية BMCL API. ويمكنك حتى تخصيص المرآة الخاصة بك في اللانشر.
optimalDisk:
  title:
    body: مساحة قرص {optimal} مع {massiveResources}
    optimal: مثالية
    massiveResources: موارد هائلة
  description: >-
    سيقوم XMCL بتخزين جميع المودات وحزم الموارد وحزم الشادر وحزم المودات في موقع تخزين واحد. عندما تحاول استخدام أي مورد معروف، سيستخدم الرابط الصلب (hard link) لتثبيت المورد في النسخة دون نسخه. هذا يعني أنك لن ترى أي نسخة مكررة في مجلد /mods بعد الآن.
cleanWorkspace:
  title:
    body: حافظ على مساحة عملك {clean} باستخدام النسخ المتعددة
    clean: نظيفة
  description: >-
    يحتوي XMCL على دعم مدمج للنسخ المتعددة. يمكنك إنشاء نسخ متعددة بسهولة. لذلك لا داعي للقلق بشأن تداخل إعدادات التشغيل المختلفة.
communityIntegration:
  title:
    body: متكامل مع {multipleCommunities}
    multipleCommunities: مجتمعات متعددة
  description: >-
    يدعم XMCL بشكل مدمج كلاً من Curseforge و Modrinth. كما يوفر القدرة على دعم حسابات المستخدمين المخصصة / وأنظمة السكنات مثل blessing skin.
