<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="150" fill="#10b981" opacity="0.1"/>
  <circle cx="1100" cy="530" r="200" fill="#3b82f6" opacity="0.1"/>
  
  <!-- Logo area -->
  <rect x="100" y="200" width="130" height="130" rx="20" fill="url(#accent)"/>
  <text x="165" y="285" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle">X</text>
  
  <!-- Title -->
  <text x="280" y="260" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">X Minecraft Launcher</text>
  
  <!-- Subtitle -->
  <text x="280" y="330" font-family="Arial, sans-serif" font-size="36" fill="#94a3b8">Modern, Open-Source Minecraft Launcher</text>
  
  <!-- Features -->
  <text x="280" y="420" font-family="Arial, sans-serif" font-size="28" fill="#10b981">✓ Mod Management</text>
  <text x="520" y="420" font-family="Arial, sans-serif" font-size="28" fill="#10b981">✓ Multi-Instance</text>
  <text x="280" y="470" font-family="Arial, sans-serif" font-size="28" fill="#3b82f6">✓ P2P Multiplayer</text>
  <text x="520" y="470" font-family="Arial, sans-serif" font-size="28" fill="#3b82f6">✓ All Mod Loaders</text>
  
  <!-- URL -->
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="32" fill="#64748b" text-anchor="middle">xmcl.app</text>
</svg>
